name: Native CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  public-tree:
    name: Public-tree safety gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Validate tracked content
        run: python -B tools/check_public_tree.py

      - name: Validate evidence ledger format
        run: python -B tools/check_ledger_format.py

      - name: Enforce native dependency boundaries
        run: python -B tools/check_native_dependencies.py

      - name: Compile-check Python tools
        run: python -m compileall -q tools

      - name: Test repository safety tools
        run: python -m unittest discover -s tools/tests -v

      - name: Verify contribution sign-offs
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python -B tools/check_dco.py "$BASE_SHA..$HEAD_SHA"

  linux-native:
    name: Linux x86-64 native build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Build the complete SDL3 runtime in supported headless-console mode so Linux compiles every
      # native platform leaf and runs the dummy-device audio test without a display server.
      - name: Configure
        run: cmake -S . -B build/linux -DCMAKE_BUILD_TYPE=Debug -DOMEGA_BUILD_RUNTIME=ON -DSDL_UNIX_CONSOLE_BUILD=ON

      - name: Build
        run: cmake --build build/linux --parallel 4

      - name: Test
        run: ctest --test-dir build/linux --output-on-failure

  windows-native:
    name: Windows x86-64 native build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Configure, build, and test
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CC = 'cl'
          $env:CXX = 'cl'
          cmake --preset msvc
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed: $LASTEXITCODE" }
          cmake --build --preset msvc-debug
          if ($LASTEXITCODE -ne 0) { throw "CMake build failed: $LASTEXITCODE" }
          ctest --preset msvc-debug --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "CTest failed: $LASTEXITCODE" }

  windows-portable-package:
    name: Windows x86-64 portable package
    needs: public-tree
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure MSVC x64 environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1
        with:
          arch: x64

      - name: Build and validate portable package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $env:CC = 'cl'
          $env:CXX = 'cl'
          cmake --preset msvc
          if ($LASTEXITCODE -ne 0) { throw "CMake configure failed: $LASTEXITCODE" }
          cmake --build --preset msvc-release
          if ($LASTEXITCODE -ne 0) { throw "Release build failed: $LASTEXITCODE" }
          ctest --preset msvc-release --output-on-failure
          if ($LASTEXITCODE -ne 0) { throw "Release test suite failed: $LASTEXITCODE" }

      - name: Retain portable package
        if: success() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: OpenOmega-0.1.0-windows-x86_64
          path: |
            build/msvc/package/OpenOmega-0.1.0-windows-x86_64.zip
            build/msvc/package/OpenOmega-0.1.0-windows-x86_64.zip.sha256
          if-no-files-found: error

  windows-portable-artifact-consumer:
    name: Windows portable fresh-VM consumer
    needs: windows-portable-package
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    timeout-minutes: 10
    steps:
      - name: Download retained portable package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: OpenOmega-0.1.0-windows-x86_64
          path: ${{ runner.temp }}/openomega-artifact

      # Deliberately no checkout or toolchain setup: this job is a consumer of the exact retained
      # artifact from the package job, on a separate fresh hosted VM.
      - name: Validate and launch retained artifact
        shell: powershell
        env:
          OPENOMEGA_ARTIFACT_DIRECTORY: ${{ runner.temp }}/openomega-artifact
        run: |
          $ErrorActionPreference = 'Stop'
          Set-StrictMode -Version Latest

          function Get-RelativeEntryPath {
            param(
              [Parameter(Mandatory = $true)][string] $RootFullName,
              [Parameter(Mandatory = $true)][string] $EntryFullName
            )

            $separator = [string][IO.Path]::DirectorySeparatorChar
            $rootPrefix = $RootFullName.TrimEnd($separator) + $separator
            if (-not $EntryFullName.StartsWith($rootPrefix, [StringComparison]::OrdinalIgnoreCase)) {
              throw 'Manifest entry escaped its root'
            }
            return $EntryFullName.Substring($rootPrefix.Length).Replace('\', '/')
          }

          function Get-TreeManifest {
            param([Parameter(Mandatory = $true)][string] $Root)

            $rootItem = Get-Item -LiteralPath $Root -Force -ErrorAction Stop
            if (-not $rootItem.PSIsContainer) {
              throw 'Manifest root is not a directory'
            }
            if (($rootItem.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw 'Manifest root is a reparse point'
            }

            $records = [Collections.Generic.List[string]]::new()
            [void] $records.Add('D|.')
            $entries = @(
              Get-ChildItem -LiteralPath $rootItem.FullName -Force -Recurse -ErrorAction Stop |
                Sort-Object -Property FullName
            )
            foreach ($entry in $entries) {
              if (($entry.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                throw 'Manifest contains a reparse point'
              }
              $relative = Get-RelativeEntryPath `
                -RootFullName $rootItem.FullName `
              -EntryFullName $entry.FullName
              if ($entry.PSIsContainer) {
                [void] $records.Add("D|$relative")
              } elseif ($entry -is [IO.FileInfo]) {
                $digest = (Get-FileHash -LiteralPath $entry.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
                [void] $records.Add("F|$relative|$($entry.Length)|$digest")
              } else {
                throw 'Manifest contains a non-regular entry'
              }
            }
            return [string]::Join("`n", $records)
          }

          function Assert-TreeManifest {
            param(
              [Parameter(Mandatory = $true)][string] $Name,
              [Parameter(Mandatory = $true)][string] $Root,
              [Parameter(Mandatory = $true)][string] $Expected
            )

            if (-not [string]::Equals(
                (Get-TreeManifest -Root $Root),
                $Expected,
                [StringComparison]::Ordinal
              )) {
              throw "$Name changed during consumer validation"
            }
          }

          function Assert-NativeSaveGenesis {
            param([Parameter(Mandatory = $true)][string] $ProfileRoot)

            $expectedEntries = @(
              'AppData/',
              'LocalAppData/',
              'LocalAppData/OpenOmega/',
              'LocalAppData/OpenOmega/native-save/',
              'LocalAppData/OpenOmega/native-save/openomega-save-a.oodb',
              'LocalAppData/OpenOmega/native-save/openomega-save-b.oodb',
              'LocalAppData/OpenOmega/native-save/openomega-save.lock',
              'Temp/'
            )
            $actualEntries = @(
              Get-ChildItem -LiteralPath $ProfileRoot -Force -Recurse -ErrorAction Stop |
                ForEach-Object {
                  if (($_.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                    throw 'Synthetic profile contains a reparse point'
                  }
                  $relative = Get-RelativeEntryPath `
                    -RootFullName $ProfileRoot `
                    -EntryFullName $_.FullName
                  if ($_.PSIsContainer) {
                    "$relative/"
                  } elseif ($_ -is [IO.FileInfo]) {
                    $relative
                  } else {
                    throw 'Synthetic profile contains a non-regular entry'
                  }
                }
            )
            $difference = @(
              Compare-Object -ReferenceObject $expectedEntries -DifferenceObject $actualEntries -CaseSensitive
            )
            if ($difference.Count -ne 0) {
              throw 'Synthetic profile does not contain exactly the native-save genesis tree'
            }

            $nativeSave = Join-Path $ProfileRoot 'LocalAppData/OpenOmega/native-save'
            foreach ($snapshotName in @('openomega-save-a.oodb', 'openomega-save-b.oodb')) {
              $snapshot = Get-Item -LiteralPath (Join-Path $nativeSave $snapshotName) -Force -ErrorAction Stop
              if ($snapshot.PSIsContainer -or $snapshot -isnot [IO.FileInfo] -or
                  $snapshot.Length -ne 64) {
                throw "$snapshotName is not a generation-zero snapshot"
              }
              $snapshotHash = (Get-FileHash -LiteralPath $snapshot.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              if ($snapshotHash -cne '5017fce9c2b7f1fe487d6d35ed3ae5af6ac1826460044af0c03af5155d6d11f4') {
                throw "$snapshotName bytes do not match format-v1 genesis"
              }
            }
            $lock = Get-Item -LiteralPath (Join-Path $nativeSave 'openomega-save.lock') -Force -ErrorAction Stop
            if ($lock.PSIsContainer -or $lock -isnot [IO.FileInfo] -or $lock.Length -ne 0) {
              throw 'Native-save lock is not an empty regular file'
            }
          }

          function Invoke-LauncherCase {
            param(
              [Parameter(Mandatory = $true)][string] $Name,
              [Parameter(Mandatory = $true)][string] $Comspec,
              [Parameter(Mandatory = $true)][string] $Taskkill,
              [Parameter(Mandatory = $true)][string] $Launcher,
              [Parameter(Mandatory = $true)][string] $WorkingDirectory,
              [Parameter(Mandatory = $true)][string[]] $Arguments,
              [Parameter(Mandatory = $true)][int] $ExpectedExitCode,
              [Parameter(Mandatory = $true)][AllowEmptyString()][string] $ExpectedStdout,
              [Parameter(Mandatory = $true)][AllowEmptyString()][string] $ExpectedStderr
            )

            $startInfo = [Diagnostics.ProcessStartInfo]::new()
            $startInfo.FileName = $Comspec
            $startInfo.WorkingDirectory = $WorkingDirectory
            $startInfo.UseShellExecute = $false
            $startInfo.CreateNoWindow = $true
            $startInfo.RedirectStandardOutput = $true
            $startInfo.RedirectStandardError = $true
            foreach ($argument in $Arguments) {
              if ($argument -cnotmatch '^--[A-Za-z0-9=-]+$') {
                throw "$Name received an unsafe test argument"
              }
            }
            $startInfo.Arguments = '/d /s /c call "' + $Launcher.Replace('"', '""') + '"'
            if ($Arguments.Count -ne 0) {
              $startInfo.Arguments += ' ' + ($Arguments -join ' ')
            }

            $process = [Diagnostics.Process]::new()
            $process.StartInfo = $startInfo
            try {
              if (-not $process.Start()) {
                throw "$Name failed to start"
              }
              $stdoutTask = $process.StandardOutput.ReadToEndAsync()
              $stderrTask = $process.StandardError.ReadToEndAsync()
              if (-not $process.WaitForExit(10000)) {
                & $Taskkill /PID $process.Id /T /F 2>$null | Out-Null
                $taskkillExitCode = $LASTEXITCODE
                if (-not $process.WaitForExit(2000)) {
                  throw "$Name could not terminate its process tree after timeout"
                }
                if ($taskkillExitCode -ne 0) {
                  throw "$Name process-tree termination failed: $taskkillExitCode"
                }
                throw "$Name exceeded the 10-second timeout"
              }
              $stdout = $stdoutTask.GetAwaiter().GetResult().Replace("`r`n", "`n").Replace("`r", "`n")
              $stderr = $stderrTask.GetAwaiter().GetResult().Replace("`r`n", "`n").Replace("`r", "`n")
              if ($process.ExitCode -ne $ExpectedExitCode) {
                throw "$Name returned an unexpected exit code: $($process.ExitCode)"
              }
              if ($stdout -cne $ExpectedStdout) {
                throw "$Name produced unexpected stdout"
              }
              if ($stderr -cne $ExpectedStderr) {
                throw "$Name produced unexpected stderr"
              }
            } finally {
              $process.Dispose()
            }
          }

          $artifactDirectory = $env:OPENOMEGA_ARTIFACT_DIRECTORY
          $zipName = 'OpenOmega-0.1.0-windows-x86_64.zip'
          $sidecarName = "$zipName.sha256"
          $zipPath = Join-Path $artifactDirectory $zipName
          $sidecarPath = Join-Path $artifactDirectory $sidecarName

          $artifactEntries = @(Get-ChildItem -LiteralPath $artifactDirectory -Force -ErrorAction Stop)
          $actualArtifactNames = @($artifactEntries | Sort-Object -Property Name | ForEach-Object Name)
          $expectedArtifactNames = @($sidecarName, $zipName) | Sort-Object
          $artifactNameDifference = @(
            Compare-Object -ReferenceObject $expectedArtifactNames -DifferenceObject $actualArtifactNames -CaseSensitive
          )
          if ($artifactNameDifference.Count -ne 0) {
            throw 'Downloaded artifact does not contain exactly the ZIP and SHA-256 sidecar'
          }
          foreach ($entry in $artifactEntries) {
            if ($entry.PSIsContainer -or $entry -isnot [IO.FileInfo] -or
                ($entry.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
              throw 'Downloaded artifact contains a non-regular entry'
            }
          }

          $sidecarBytes = [IO.File]::ReadAllBytes($sidecarPath)
          if (@($sidecarBytes | Where-Object { $_ -gt 0x7f }).Count -ne 0) {
            throw 'SHA-256 sidecar is not BOM-free ASCII'
          }
          $sidecarText = [Text.Encoding]::ASCII.GetString($sidecarBytes)
          $sidecarPattern = '^(?<hash>[0-9a-f]{64})  ' + [regex]::Escape($zipName) + '\r\n\z'
          $sidecarMatch = [regex]::Match(
            $sidecarText,
            $sidecarPattern,
            [Text.RegularExpressions.RegexOptions]::CultureInvariant
          )
          if (-not $sidecarMatch.Success) {
            throw 'SHA-256 sidecar does not match the exact syntax contract'
          }
          $actualZipDigest = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actualZipDigest -cne $sidecarMatch.Groups['hash'].Value) {
            throw 'SHA-256 sidecar does not match the downloaded ZIP'
          }

          $testRoot = Join-Path $env:RUNNER_TEMP ('openomega-consumer-' + [guid]::NewGuid().ToString('N'))
          $extractDirectory = Join-Path $testRoot 'extract'
          $unrelatedDirectory = Join-Path $testRoot 'unrelated'
          $profileDirectory = Join-Path $testRoot 'profile'
          $localAppData = Join-Path $profileDirectory 'LocalAppData'
          $roamingAppData = Join-Path $profileDirectory 'AppData'
          $tempDirectory = Join-Path $profileDirectory 'Temp'
          foreach ($directory in @(
            $extractDirectory,
            $unrelatedDirectory,
            $localAppData,
            $roamingAppData,
            $tempDirectory
          )) {
            $null = New-Item -ItemType Directory -Path $directory -ErrorAction Stop
          }

          Expand-Archive -LiteralPath $zipPath -DestinationPath $extractDirectory -ErrorAction Stop
          $packageRootName = 'OpenOmega-0.1.0-windows-x86_64'
          $expectedPackageEntries = @(
            "$packageRootName/",
            "$packageRootName/LICENSE",
            "$packageRootName/LICENSES/",
            "$packageRootName/LICENSES/SDL3.txt",
            "$packageRootName/NOTICE",
            "$packageRootName/README-WINDOWS.md",
            "$packageRootName/THIRD_PARTY_NOTICES.md",
            "$packageRootName/TRADEMARKS.md",
            "$packageRootName/launch-openomega.cmd",
            "$packageRootName/openomega.exe"
          )
          $actualPackageEntries = @(
            Get-ChildItem -LiteralPath $extractDirectory -Force -Recurse -ErrorAction Stop |
              ForEach-Object {
                if (($_.Attributes -band [IO.FileAttributes]::ReparsePoint) -ne 0) {
                  throw 'Extracted package contains a reparse point'
                }
                $relative = Get-RelativeEntryPath `
                  -RootFullName $extractDirectory `
                  -EntryFullName $_.FullName
                if ($_.PSIsContainer) {
                  "$relative/"
                } elseif ($_ -is [IO.FileInfo]) {
                  $relative
                } else {
                  throw 'Extracted package contains a non-regular entry'
                }
              }
          )
          $packageEntryDifference = @(
            Compare-Object -ReferenceObject $expectedPackageEntries -DifferenceObject $actualPackageEntries -CaseSensitive
          )
          if ($packageEntryDifference.Count -ne 0) {
            throw 'Extracted package does not match the exact two-directory/eight-file tree'
          }

          $packageRoot = Join-Path $extractDirectory $packageRootName
          $launcher = Join-Path $packageRoot 'launch-openomega.cmd'
          $systemDirectory = Join-Path $env:SystemRoot 'System32'
          $comspec = Join-Path $systemDirectory 'cmd.exe'
          $taskkill = Join-Path $systemDirectory 'taskkill.exe'
          if (-not (Test-Path -LiteralPath $comspec -PathType Leaf) -or
              -not (Test-Path -LiteralPath $taskkill -PathType Leaf)) {
            throw 'Required absolute Windows system process tools are unavailable'
          }

          $artifactManifestBefore = Get-TreeManifest -Root $artifactDirectory
          $packageManifestBefore = Get-TreeManifest -Root $packageRoot
          $unrelatedManifestBefore = Get-TreeManifest -Root $unrelatedDirectory

          $env:ComSpec = $comspec
          $env:PATH = "$systemDirectory;$env:SystemRoot"
          $env:LOCALAPPDATA = $localAppData
          $env:APPDATA = $roamingAppData
          $env:USERPROFILE = $profileDirectory
          $env:TEMP = $tempDirectory
          $env:TMP = $tempDirectory
          $env:OPENOMEGA_DISABLE_STARTUP_DIALOG = '1'

          Invoke-LauncherCase `
            -Name 'zero-frame launch' `
            -Comspec $comspec `
            -Taskkill $taskkill `
            -Launcher $launcher `
            -WorkingDirectory $unrelatedDirectory `
            -Arguments @('--frames=0') `
            -ExpectedExitCode 0 `
            -ExpectedStdout "OpenOmega native persistence: profiles=0`nOpenOmega native shell: rendered_frames=0`n" `
            -ExpectedStderr ''
          Assert-TreeManifest -Name 'Downloaded artifact' -Root $artifactDirectory -Expected $artifactManifestBefore
          Assert-TreeManifest -Name 'Extracted package' -Root $packageRoot -Expected $packageManifestBefore
          Assert-TreeManifest -Name 'Unrelated working directory' -Root $unrelatedDirectory -Expected $unrelatedManifestBefore
          Assert-NativeSaveGenesis -ProfileRoot $profileDirectory
          $profileManifestAfterFirstNativeStartup = Get-TreeManifest -Root $profileDirectory

          Invoke-LauncherCase `
            -Name 'zero-frame native persistence reopen' `
            -Comspec $comspec `
            -Taskkill $taskkill `
            -Launcher $launcher `
            -WorkingDirectory $unrelatedDirectory `
            -Arguments @('--frames=0') `
            -ExpectedExitCode 0 `
            -ExpectedStdout "OpenOmega native persistence: profiles=0`nOpenOmega native shell: rendered_frames=0`n" `
            -ExpectedStderr ''
          Assert-TreeManifest -Name 'Downloaded artifact' -Root $artifactDirectory -Expected $artifactManifestBefore
          Assert-TreeManifest -Name 'Extracted package' -Root $packageRoot -Expected $packageManifestBefore
          Assert-TreeManifest -Name 'Unrelated working directory' -Root $unrelatedDirectory -Expected $unrelatedManifestBefore
          Assert-TreeManifest -Name 'Synthetic profile native persistence reopen' -Root $profileDirectory -Expected $profileManifestAfterFirstNativeStartup

          $sentinelStderr = @(
            'unknown option: --openomega-package-contract-sentinel',
            'usage: openomega [-h|--help]',
            '       openomega [--config=PATH] [--set=KEY=VALUE ...] [--frames=N [--capture-run [--replay-capture]]] [--data-root=PATH [--level=CODE]] [--probe-only] [--opening-movie=PATH]'
          ) -join "`n"
          $sentinelStderr += "`n"
          Invoke-LauncherCase `
            -Name 'argument-forwarding launch' `
            -Comspec $comspec `
            -Taskkill $taskkill `
            -Launcher $launcher `
            -WorkingDirectory $unrelatedDirectory `
            -Arguments @('--openomega-package-contract-sentinel') `
            -ExpectedExitCode 1 `
            -ExpectedStdout '' `
            -ExpectedStderr $sentinelStderr
          Assert-TreeManifest -Name 'Downloaded artifact' -Root $artifactDirectory -Expected $artifactManifestBefore
          Assert-TreeManifest -Name 'Extracted package' -Root $packageRoot -Expected $packageManifestBefore
          Assert-TreeManifest -Name 'Unrelated working directory' -Root $unrelatedDirectory -Expected $unrelatedManifestBefore
          Assert-TreeManifest -Name 'Synthetic profile' -Root $profileDirectory -Expected $profileManifestAfterFirstNativeStartup

          Write-Host 'fresh-VM portable consumer: OK (artifact, checksum, tree, native persistence, launch, immutability)'
