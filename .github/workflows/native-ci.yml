name: Native CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  public-tree:
    name: Public-tree safety gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Validate tracked content
        run: python -B tools/check_public_tree.py

      - name: Compile-check Python tools
        run: python -m compileall -q tools

      - name: Test repository safety tools
        run: python -m unittest discover -s tools/tests -v

      - name: Verify contribution sign-offs
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: python -B tools/check_dco.py "$BASE_SHA..$HEAD_SHA"

  windows-native:
    name: Windows x86-64 native build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Configure, build, and test
        shell: cmd
        run: |
          call "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          set "CC=cl"
          set "CXX=cl"
          cmake --preset msvc
          cmake --build --preset msvc-debug
          ctest --preset msvc-debug
